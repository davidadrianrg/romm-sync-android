# Builds the APK on every push to master and publishes it as a GitHub Release.
# Generates a temporary release keystore if signing secrets are not configured,
# so the release APK is always signed and installable.
name: Build & Release APK

on:
  push:
    branches: [master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Inject version into build.gradle.kts ──────────────────────────
      # Versioning: v{MAJOR}.{MINOR}.{run_number}
      - name: Compute version
        id: version
        run: |
          MAJOR="0"
          MINOR="1"
          PATCH="${{ github.run_number }}"
          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          sed -i "s/versionCode = .*/versionCode = ${PATCH}/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \\\"${MAJOR}.${MINOR}.${PATCH}\\\"/" app/build.gradle.kts
          echo "✅ Set versionCode=$PATCH versionName=${MAJOR}.${MINOR}.${PATCH}"

      # ── Signing keystore ──────────────────────────────────────────────
      # If SIGNING_KEYSTORE_BASE64 secret is set, decode it into a real keystore.
      # Otherwise, generate a temporary self-signed keystore so the release APK
      # is always signed (installable on devices). The temp keystore is discarded
      # after the workflow run — it should NOT be used for Play Store uploads.
      - name: Set up signing keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" ]; then
            echo "🔓 Using project signing keystore from secrets"
            echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > /tmp/romm-sync-release.jks
            cat > keystore.properties <<EOF
          storeFile=/tmp/romm-sync-release.jks
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          EOF
          else
            echo "🔐 No signing secrets found — generating temporary keystore"
            keytool -genkeypair \
              -alias romm-sync \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore /tmp/romm-sync-release.jks \
              -storepass rommsync \
              -keypass rommsync \
              -dname "CN=RomM Sync, OU=CI, O=davidrg, L=Madrid, ST=Madrid, C=ES"
            cat > keystore.properties <<EOF
          storeFile=/tmp/romm-sync-release.jks
          storePassword=rommsync
          keyAlias=romm-sync
          keyPassword=rommsync
          EOF
          fi
          echo "✅ keystore.properties created"

      # ── Build both debug and release ──────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v7
        with:
          name: romm-sync-release
          path: app/build/outputs/apk/release/app-release.apk

      # ── Create / update a release with the APK ────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            **RomM Sync Android** – APK generado automáticamente

            **Commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}`)

            **Build type:** Release (R8 minified + resource shrinking)

            **Para instalar:**
            1. Descarga el APK desde los adjuntos de esta release
            2. Transfiérelo a tu dispositivo Android
            3. Activa *Instalar desde orígenes desconocidos* si es necesario
            4. Abre el archivo `.apk` para iniciar la instalación
          files: app/build/outputs/apk/release/app-release.apk
