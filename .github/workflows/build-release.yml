# Builds the debug APK on every push to master and publishes it as a GitHub Release.
name: Build & Release APK

on:
  push:
    branches: [master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Inject version into build.gradle.kts ──────────────────────────
      # Versioning: v{MAJOR}.{MINOR}.{run_number}
      # The APK's versionName and versionCode are set from CI so they
      # always match the GitHub Release tag exactly.
      - name: Compute version
        id: version
        run: |
          MAJOR="0"
          MINOR="1"
          PATCH="${{ github.run_number }}"
          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          # Patch build.gradle.kts with the computed version
          sed -i "s/versionCode = .*/versionCode = ${PATCH}/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"${MAJOR}.${MINOR}.${PATCH}\"/" app/build.gradle.kts
          echo "✅ Set versionCode=$PATCH versionName=${MAJOR}.${MINOR}.${PATCH}"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v5
        with:
          name: romm-sync-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # ── Create / update a release with the APK ────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            **RomM Sync Android** – APK generado automáticamente

            **Commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            **Para instalar:**
            1. Descarga el APK desde los adjuntos de esta release
            2. Transfiérelo a tu dispositivo Android
            3. Activa *Instalar desde orígenes desconocidos* si es necesario
            4. Abre el archivo `.apk` para iniciar la instalación
          files: app/build/outputs/apk/debug/app-debug.apk